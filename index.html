<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Credencial - Cookins</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/twbs/icons/main/icons/shield-check.svg">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; margin: 0; padding: 40px 20px; display: flex; align-items: center; justify-content: center; min-height: 80vh; }
        .card { background: white; color: #0f172a; border-radius: 24px; padding: 35px 25px; width: 100%; max-width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); text-align: center; box-sizing: border-box; }
        h2 { margin: 0 0 10px 0; font-weight: 800; color: #0f172a; font-size: 1.5rem; }
        h3 { margin: 0 0 5px 0; color: #8b2999; font-weight: 800; font-size: 1.3rem; }
        p { color: #64748b; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1.1rem; outline: none; margin-bottom: 20px; box-sizing: border-box; text-align: center; font-weight: 600; }
        input:focus { border-color: #8b2999; }
        .btn { width: 100%; background: #8ec919; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 1rem; }
        .badge { display: inline-block; background: #8ec919; color: #0f172a; padding: 5px 15px; border-radius: 50px; font-weight: 800; font-size: 0.85rem; }
        .timer { font-size: 0.9rem; color: #64748b; margin-top: 15px; font-weight: 600; }
        .btn-link { background: none; border: none; color: #ff4b5c; font-weight: bold; font-size: 0.8rem; margin-top: 25px; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

    <div class="card" id="pantalla-registro" style="display: none;">
        <h2>IDENTIFICACIÓN</h2>
        <p>Ingrese su número de DNI para vincular su credencial de comedor.</p>
        <input type="number" id="input-dni" placeholder="Sin puntos ni espacios">
        <button class="btn" onclick="vincularUsuario()">OBTENER QR</button>
    </div>

    <div class="card" id="pantalla-credencial" style="display: none;">
        <h3 id="txt-nombre">---</h3>
        <span class="badge" id="txt-legajo">LEGAJO: ---</span>
        <div id="qrcode" style="width: 220px; height: 220px; margin: 25px auto; display: block;"></div>
        <div class="timer">El código QR cambia en: <b id="countdown">30</b>s</div>
        <button class="btn-link" onclick="desvincular()">Desvincular celular</button>
    </div>

    <script>
        // 🌟 CONFIGURACIÓN: Agregá acá los nombres de tus archivos JSON (sin el .json)
        // A medida que sumes plantas en Python, venís acá y agregás el nombre a la lista.
        const listaComedores = ["datos_qr", "base_usuarios"];

        // Motor criptográfico nativo
        function base32tohex(base32) {
            let base32chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
            let bits = "";
            let hex = "";
            for (let i = 0; i < base32.length; i++) {
                let val = base32chars.indexOf(base32.charAt(i).toUpperCase());
                if (val === -1) continue;
                bits += Array(5 - val.toString(2).length + 1).join("0") + val.toString(2);
            }
            for (let i = 0; i + 4 <= bits.length; i += 4) {
                let chunk = bits.substr(i, 4);
                hex = hex + parseInt(chunk, 2).toString(16);
            }
            return hex;
        }

        function generarTokenLocal(semilla) {
            try {
                let epoch = Math.floor(Date.now() / 1000);
                let tiempoBloque = Math.floor(epoch / 30);
                let hexTiempo = Math.floor(tiempoBloque).toString(16);
                while (hexTiempo.length < 16) hexTiempo = "0" + hexTiempo;
                
                let hexSemilla = base32tohex(semilla);
                let numeroBase = parseInt(hexSemilla.substr(0, 8), 16) || 12345678;
                let factorTiempo = parseInt(hexTiempo.substr(hexTiempo.length - 8), 16);
                
                let tokenFinal = String((numeroBase + factorTiempo) % 1000000);
                while (tokenFinal.length < 6) tokenFinal = "0" + tokenFinal;
                return tokenFinal;
            } catch (e) {
                return "000000";
            }
        }

        let datosUsuarios = {};
        let timerInterval = -1;
        let qrGenerador = null;

        // Al arrancar, si ya está guardado en memoria, va directo a la credencial
        window.onload = function() {
            const dniGuardado = localStorage.getItem("cookins_dni");
            if (dniGuardado) {
                // Si hay DNI en memoria, tenemos que buscar a qué planta pertenecía
                buscarDniEnTodosLosComedores(dniGuardado, true);
            } else {
                document.getElementById("pantalla-registro").style.display = "block";
            }
        };

        function vincularUsuario() {
            const dniInput = String(document.getElementById("input-dni").value).trim();
            if (!dniInput) { alert("Por favor, ingrese un DNI"); return; }
            buscarDniEnTodosLosComedores(dniInput, false);
        }

        // 🔍 ESTA ES LA FUNCIÓN MÁGICA QUE RECORRE TODOS LOS JSON
        async function buscarDniEnTodosLosComedores(dni, esCargaInicial) {
            let usuarioEncontrado = null;

            // Recorremos la lista de plantas una por una disparando consultas en paralelo
            for (const comedor of listaComedores) {
                try {
                    const res = await fetch(comedor + '.json?v=' + Date.now());
                    if (res.ok) {
                        const data = await res.json();
                        if (data[dni]) {
                            usuarioEncontrado = data[dni];
                            console.log(`DNI encontrado con éxito en el archivo: ${comedor}.json`);
                            break; // Cortamos el bucle apenas lo encontramos
                        }
                    }
                } catch (err) {
                    console.error("Error leyendo el comedor: " + comedor, err);
                }
            }

            if (usuarioEncontrado) {
                // Si lo encontramos, guardamos en memoria y dibujamos la tarjeta
                localStorage.setItem("cookins_dni", dni);
                document.getElementById("pantalla-registro").style.display = "none";
                mostrarCredencial(dni, usuarioEncontrado);
            } else {
                // Si falló en la carga automática de memoria, limpiamos por las dudas
                if (esCargaInicial) {
                    localStorage.removeItem("cookins_dni");
                    document.getElementById("pantalla-registro").style.display = "block";
                } else {
                    alert("❌ El DNI ingresado no se encuentra habilitado en ninguna de nuestras plantas activas.");
                }
            }
        }

        function mostrarCredencial(dni, user) {
            document.getElementById("txt-nombre").textContent = user.nombre;
            document.getElementById("txt-legajo").textContent = "LEGAJO: " + user.legajo;
            document.getElementById("pantalla-credencial").style.display = "block";

            const qrContenedor = document.getElementById("qrcode");
            qrContenedor.innerHTML = ""; 

            qrGenerador = new QRCode(qrContenedor, {
                text: "Inicializando...",
                width: 220,
                height: 220,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            let ultimoToken = "";

            function actualizarRelojYQR() {
                let segundosRestantes = 30 - (Math.floor(Date.now() / 1000) % 30);
                document.getElementById("countdown").textContent = segundosRestantes;

                const tokenActual = generarTokenLocal(user.semilla);
                
                if (tokenActual !== ultimoToken) {
                    ultimoToken = tokenActual;
                    const cadenaFinal = dni + "-" + tokenActual;
                    qrGenerador.makeCode(cadenaFinal);
                }
            }

            setTimeout(actualizarRelojYQR, 50);

            if (timerInterval !== -1) clearInterval(timerInterval);
            timerInterval = setInterval(actualizarRelojYQR, 1000);
        }

        function desvincular() {
            if (confirm("¿Desvincular este celular?")) {
                clearInterval(timerInterval);
                localStorage.removeItem("cookins_dni");
                document.getElementById("pantalla-credencial").style.display = "none";
                document.getElementById("pantalla-registro").style.display = "block";
            }
        }
    </script>
</body>
</html>
